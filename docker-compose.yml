version: '3.8'

services:
  offer-radar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: offer-radar
    restart: unless-stopped

    env_file: .env

    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=production

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    security_opt:
      - apparmor=unconfined

    mem_limit: 512m
    cpus: 1.0

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
